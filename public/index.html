<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Restaurant ChatBot</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f4f4f4;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      margin: 0;
    }

    .chat-container {

      width: 400px;

      background: white;

      border-radius: 12px;

      overflow: hidden;

      box-shadow: 0 0 15px rgba(0,0,0,0.2);

      display: flex;

      flex-direction: column;
    }

    .chat-header {

      background: #ff6600;

      color: white;

      padding: 15px;

      font-size: 20px;

      font-weight: bold;

      text-align: center;
    }

    .chat-box {

      height: 450px;

      overflow-y: auto;

      padding: 15px;

      background: #fafafa;
    }

    .message {

      margin-bottom: 12px;

      padding: 10px 14px;

      border-radius: 12px;

      max-width: 80%;

      white-space: pre-wrap;
    }

    .bot {

      background: #e5e5e5;

      color: black;
    }

    .user {

      background: #ff6600;

      color: white;

      margin-left: auto;
    }

    .input-area {

      display: flex;

      border-top: 1px solid #ddd;
    }

    #userInput {

      flex: 1;

      padding: 14px;

      border: none;

      outline: none;

      font-size: 16px;
    }

    button {

      padding: 14px 20px;

      border: none;

      background: #ff6600;

      color: white;

      cursor: pointer;

      font-size: 16px;
    }

    button:hover {

      background: #e65c00;
    }

  </style>

</head>

<body>

  <div class="chat-container">

    <div class="chat-header">
      Restaurant ChatBot 🍔
    </div>

    <div
      class="chat-box"
      id="chatBox"
    ></div>

    <div class="input-area">

      <input
        type="text"
        id="userInput"
        placeholder="Type here..."
      />

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

  <script>

    let sessionId =
      localStorage.getItem("sessionId") || "";

    const chatBox =
      document.getElementById("chatBox");

    const input =
      document.getElementById("userInput");

    // Add message
    function addMessage(message, sender) {

      const div =
        document.createElement("div");

      div.classList.add(
        "message",
        sender
      );

      div.innerText = message;

      chatBox.appendChild(div);

      chatBox.scrollTop =
        chatBox.scrollHeight;
    }

    // Typing indicator
    function showTyping() {

      const typing =
        document.createElement("div");

      typing.classList.add(
        "message",
        "bot"
      );

      typing.id = "typing";

      typing.innerText = "Typing...";

      chatBox.appendChild(typing);

      chatBox.scrollTop =
        chatBox.scrollHeight;
    }

    // Remove typing
    function removeTyping() {

      const typing =
        document.getElementById("typing");

      if (typing) {
        typing.remove();
      }
    }

    // Send message
    async function sendMessage() {

      const message =
        input.value.trim();

      if (!message) return;

      addMessage(
        message,
        "user"
      );

      input.value = "";

      showTyping();

      try {

        const response =
          await fetch(
            "https://restaurant-chatbot-coks.onrender.com",
            {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({
                message,
                sessionId
              })

            }
          );

        const data =
          await response.json();

        removeTyping();

        sessionId =
          data.sessionId;

        localStorage.setItem(
          "sessionId",
          sessionId
        );

        addMessage(
          data.response,
          "bot"
        );

      } catch (error) {

        removeTyping();

        addMessage(
          "Server error ❌",
          "bot"
        );

        console.log(error);
      }

      input.focus();
    }

    // ENTER key support
    input.addEventListener(
      "keypress",
      function(event) {

        if (event.key === "Enter") {
          sendMessage();
        }
      }
    );

    // Welcome message
    window.onload = () => {

      addMessage(
`Welcome 🍽️

Select:
1 - Place Order
99 - Checkout Order
98 - Order History
97 - Current Order
0 - Cancel Order`,
        "bot"
      );

      input.focus();
    };

  </script>

</body>

</html>
